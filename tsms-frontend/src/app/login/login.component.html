<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-icon class="login-icon" color="primary">lock</mat-icon>
      <mat-card-title>TSMS Login</mat-card-title>
      <mat-card-subtitle>Total Solution Management System</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput formControlName="userName" autocomplete="username">
          <mat-icon matPrefix>person</mat-icon>
          <mat-error *ngIf="form.get('userName')?.hasError('required')">Username is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'"
                 formControlName="password" autocomplete="current-password">
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit"
                class="full-width login-btn" [disabled]="form.invalid || loading">
          <mat-icon *ngIf="!loading">login</mat-icon>
          <span *ngIf="!loading">Login</span>
          <span *ngIf="loading">Logging in...</span>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
