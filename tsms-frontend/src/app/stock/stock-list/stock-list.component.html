<div class="container">
  <div class="header">
    <h2>Stock / Inventory Management</h2>
    <button mat-raised-button color="primary" (click)="openForm()">
      <mat-icon>add</mat-icon> Add Stock Item
    </button>
  </div>

  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search stock</mat-label>
    <input matInput [(ngModel)]="searchText" (keyup)="applyFilter()" placeholder="Search by item, brand...">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="table-container mat-elevation-z2">
    <table mat-table [dataSource]="dataSource" matSort>

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
        <td mat-cell *matCellDef="let row">{{row.id}}</td>
      </ng-container>

      <ng-container matColumnDef="stockItem">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Stock Item</th>
        <td mat-cell *matCellDef="let row">{{row.stockItem}}</td>
      </ng-container>

      <ng-container matColumnDef="brand">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Brand</th>
        <td mat-cell *matCellDef="let row">{{row.brand?.name}}</td>
      </ng-container>

      <ng-container matColumnDef="siNumber">
        <th mat-header-cell *matHeaderCellDef>SI Number</th>
        <td mat-cell *matCellDef="let row">{{row.siNumber}}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
        <td mat-cell *matCellDef="let row">
          <span class="status-chip" [ngClass]="row.status?.toLowerCase()">{{row.status}}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" matTooltip="Edit" (click)="openForm(row)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" matTooltip="Delete" (click)="deleteStock(row.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="6" style="text-align: center; padding: 20px;">
          No stock items found
        </td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
  </div>
</div>
